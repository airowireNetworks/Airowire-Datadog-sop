site_name: Airowire Observability & FinOps Docs

theme:
  name: material
  logo: images/airowire-logo.png
  favicon: images/airowire-logo.png
  features:
    - content.code.copy
    - content.code.select
    - navigation.top
    - navigation.expand
    - navigation.sections
    - search.suggest
    - search.highlight
    - header.sticky
    - toc.follow
    - toc.sidebar

plugins:
  - search:
      lang: en
  - pdf-export:
      verbose: true
      combined: false
      enabled_if_env: ENABLE_PDF_EXPORT

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji
  - toc:
      permalink: true
      toc_depth: 4

extra_javascript:
  - javascripts/page-pdf-download.js

nav:
  - Home: index.md

  - Azure:
      - Logs:
          - Logs Enablement (Main): azure/logs/logs.md
          - Logs Enablement (LR): azure/logs/lr.md
          - Logs Enablement (LRR): azure/logs/lrr.md

      - APM:
          - Azure APM Enablement: azure/apm/apm.md

      - DSM:
          - AKS with RabbitMQ: azure/dsm/dsm-solution.md
          - HA VMs with RabbitMQ: azure/dsm/dsm-ansible.md
          - HA VMs with RabbitMQ1: azure/tt/tt.md

      - Cost Optimization:
          - Azure Cost Optimization: azure/cost-management/cost.md

      - SLA:
          - AKS SLA Monitoring: azure/sla/sla.md

      - DB Monitoring: []

  - AWS:
      - Logs: []
      - APM: []
      - Tracing: []
      - Cost Management:
          - AWS Cost Management: aws/cost-management/aws-ccm.md
      - DB Monitoring: []

  - GCP:
      - Logs: []
      - APM: []
      - Metrics: []
      - Cost Management: []
      - DB Monitoring: []

  - Kubernetes: []

  - FinOps: []

  - Observability:
      - DB Monitoring: []

  - SRE Practices:
      - DB Runbooks: []

  - Datadog:
      - Datadog Support Tickets: datadog/data/tickets.md
      - Datadog DevSecOps: datadog/data/devsecops.md

  - Network Devices:
      - Network Plan: network/net/plan.md
